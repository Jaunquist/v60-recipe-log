<div id="beanModal" class="modal hidden" aria-hidden="true">
  <div class="modal-backdrop" data-close-bean-modal></div>

  <div class="modal-dialog modal-dialog--bean" role="dialog" aria-modal="true" aria-labelledby="beanModalTitle">
    <div class="modal-card">
      <div class="modal-card__header">
        <div>
          <h2 id="beanModalTitle">Bean Entry</h2>
          <p class="modal-card__subtext">Add or edit a coffee bean record.</p>
        </div>
        <button type="button" class="icon-btn" id="closeBeanModalBtn" aria-label="Close bean popup">✕</button>
      </div>

      <form id="beanForm" class="stack-lg">
        <input type="hidden" id="beanId" name="beanId" />

        <section class="stack-md">
          <div class="section-heading">
            <h3>Bean Photo</h3>
            <p>Upload the bag photo first so OCR can assist the rest of the form.</p>
          </div>

          <div class="photo-upload-card">
            <div class="photo-upload-card__top">
              <div id="beanPhotoPreview" class="bean-photo-preview bean-photo-preview--empty">
                <span>No photo uploaded</span>
              </div>

              <div class="photo-upload-card__actions">
                <input
                  id="beanPhotoInput"
                  type="file"
                  accept="image/*"
                  hidden
                />

                <button type="button" id="selectBeanPhotoBtn" class="btn btn-secondary">
                  Choose Photo
                </button>

                <button type="button" id="uploadBeanPhotoBtn" class="btn btn-primary">
                  Upload Photo
                </button>
              </div>
            </div>

            <div id="ocrStatusLine" class="ocr-status ocr-status--neutral">
              OCR: not run yet
            </div>

            <div id="photoFileMeta" class="photo-file-meta"></div>

            <input type="hidden" id="photo_file_id" name="photo_file_id" />
            <input type="hidden" id="photo_file_name" name="photo_file_name" />
            <input type="hidden" id="photo_drive_link" name="photo_drive_link" />
            <input type="hidden" id="photo_preview_data_url" name="photo_preview_data_url" />
          </div>
        </section>

        <section class="stack-md">
          <div class="section-heading">
            <h3>Bean Details</h3>
          </div>

          <div class="form-grid">
            <div class="form-group form-group--full">
              <label for="bean">Bean Name</label>
              <input id="bean" name="bean" type="text" placeholder="e.g. Ethiopia Chelbesa" />
            </div>

            <div class="form-group">
              <label for="roaster">Roaster</label>
              <input id="roaster" name="roaster" type="text" />
            </div>

            <div class="form-group">
              <label for="purchase_country">Purchase Country</label>
              <input id="purchase_country" name="purchase_country" type="text" />
            </div>

            <div class="form-group">
              <label for="origin_country">Origin Country</label>
              <input id="origin_country" name="origin_country" type="text" />
            </div>

            <div class="form-group">
              <label for="origin_region">Origin Region</label>
              <input id="origin_region" name="origin_region" type="text" />
            </div>

            <div class="form-group">
              <label for="variety">Variety</label>
              <input id="variety" name="variety" type="text" />
            </div>

            <div class="form-group">
              <label for="producer">Producer</label>
              <input id="producer" name="producer" type="text" />
            </div>

            <div class="form-group">
              <label for="farm">Farm</label>
              <input id="farm" name="farm" type="text" />
            </div>

            <div class="form-group">
              <label for="altitude">Altitude</label>
              <input id="altitude" name="altitude" type="text" />
            </div>

            <div class="form-group">
              <label for="process">Process</label>
              <input id="process" name="process" type="text" />
            </div>

            <div class="form-group form-group--full">
              <label for="tags">Tags</label>
              <input id="tags" name="tags" type="text" placeholder="floral, citrus, clean" />
            </div>

            <div class="form-group form-group--full">
              <label for="notes">Notes</label>
              <textarea id="notes" name="notes" rows="4"></textarea>
            </div>

            <div class="form-group form-group--full">
              <label for="photo_text">Photo Text (OCR)</label>
              <textarea id="photo_text" name="photo_text" rows="6" placeholder="OCR output will appear here after upload."></textarea>
            </div>
          </div>
        </section>

        <div class="modal-card__footer">
          <div class="modal-card__footer-left">
            <button type="button" id="researchBeanBtn" class="btn btn-secondary">
              Research Bean
            </button>
          </div>

          <div class="modal-card__footer-right">
            <button type="button" id="cancelBeanBtn" class="btn btn-ghost">
              Cancel
            </button>
            <button type="submit" id="saveBeanBtn" class="btn btn-primary">
              Save Bean
            </button>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>
